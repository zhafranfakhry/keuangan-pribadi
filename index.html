<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <!-- ==========================================
         HEADER
    ========================================== -->

    <header class="header">

        <h1>Halo Mas Rifai 👋</h1>

        <p>Seberapa boros kamu bulan ini?</p>

    </header>



    <!-- ==========================================
         SUMMARY
    ========================================== -->

    <section class="summary">

        <div class="card">

            <h3>Pemasukan</h3>

            <p id="income">Rp 0</p>

        </div>

        <div class="card">

            <h3>Pengeluaran</h3>

            <p id="expense">Rp 0</p>

        </div>

        <div class="card">

            <h3>Sisa Saldo</h3>

            <p id="balance">Rp 0</p>

        </div>

    </section>



    <!-- ==========================================
         FOOTER
    ========================================== -->

    <footer>

        <small id="last-sync">

            Last Sync: -

        </small>

    </footer>



    <script src="./js/app.js"></script>

</body>

</html>
