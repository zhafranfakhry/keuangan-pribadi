<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <div class="container">

        <!-- ==================================================
             HEADER
        ================================================== -->

        <header class="header">

            <div>
                <h1>Halo Mas Rifai 👋</h1>
                <p>Seberapa boros kamu bulan ini?</p>
            </div>

        </header>



        <!-- ==================================================
             SUMMARY
        ================================================== -->

        <section class="summary">

            <div class="card">

                <span class="card-label">
                    Total Pemasukan
                </span>

                <p id="income">
                    Rp 0
                </p>

            </div>


            <div class="card">

                <span class="card-label">
                    Total Pengeluaran
                </span>

                <p id="expense">
                    Rp 0
                </p>

            </div>


            <div class="card">

                <span class="card-label">
                    Sisa Saldo
                </span>

                <p id="balance">
                    Rp 0
                </p>

            </div>

        </section>

<!-- ==================================================
     ANALYTICS
================================================== -->

<section class="analytics">

    <div class="card">

        <h2 class="section-title">
            Perbandingan 3 Bulan
        </h2>

        <canvas id="monthly-chart">

        </canvas>

    </div>

</section>



<!-- ==================================================
     TOP LIST
================================================== -->

<section class="top-grid">

    <div class="card">

        <h2 class="section-title">
            Top Pemasukan
        </h2>

        <div id="top-income">

        </div>

    </div>


    <div class="card">

        <h2 class="section-title">
            Top Pengeluaran
        </h2>

        <div id="top-expense">

        </div>

    </div>

</section>

        <!-- ==================================================
             FILTERS
        ================================================== -->

        <section class="filters">

            <select id="month-filter">
                <option value="">
                    Semua Bulan
                </option>
            </select>

            <select id="type-filter">
                <option value="">
                    Semua Jenis
                </option>

                <option value="masuk">
                    Pemasukan
                </option>

                <option value="keluar">
                    Pengeluaran
                </option>
            </select>

            <select id="category-filter">
                <option value="">
                    Semua Kategori
                </option>
            </select>

        </section>



        <!-- ==================================================
             TRANSACTIONS
        ================================================== -->

        <section>

            <h2 class="section-title">
                Transaksi
            </h2>

            <div id="transaction-list">

            </div>

        </section>



        <!-- ==================================================
             FOOTER
        ================================================== -->

        <footer>

            <small id="last-sync">

                Last Sync : -

            </small>

        </footer>

    </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
